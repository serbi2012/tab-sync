<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TabShop — 탭 동기화 장바구니 데모 | tab-bridge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ── Tokens ── */
    :root {
      --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --mono: 'JetBrains Mono', 'SF Mono', monospace;
      --bg: #f8fafc;
      --surface: #ffffff;
      --surface2: #f1f5f9;
      --text: #0f172a;
      --text2: #475569;
      --text3: #94a3b8;
      --border: #e2e8f0;
      --border2: #cbd5e1;
      --indigo: #6366f1;
      --indigo-hover: #4f46e5;
      --indigo-soft: #eef2ff;
      --emerald: #10b981;
      --emerald-hover: #059669;
      --emerald-soft: #d1fae5;
      --danger: #ef4444;
      --danger-soft: #fee2e2;
      --radius: 14px;
      --radius-sm: 10px;
      --radius-xs: 6px;
      --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,.06), 0 2px 6px rgba(0,0,0,.04);
      --shadow-lg: 0 12px 24px rgba(0,0,0,.08);
      --transition: .22s cubic-bezier(.4,0,.2,1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }
    ::selection { background: var(--indigo); color: #fff; }

    /* ── Layout ── */
    .app {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      position: sticky;
      top: 0;
      z-index: 200;
      background: rgba(255,255,255,.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .header-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-brand .logo {
      font-size: 24px;
    }
    .header-brand h1 {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -.4px;
      background: linear-gradient(135deg, var(--indigo), var(--emerald));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .cart-trigger {
      position: relative;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      background: var(--indigo-soft);
      color: var(--indigo);
      border: 1px solid rgba(99,102,241,.25);
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
    }
    .cart-trigger:hover {
      background: var(--indigo);
      color: #fff;
      border-color: var(--indigo);
    }
    .cart-badge {
      min-width: 22px;
      height: 22px;
      padding: 0 6px;
      background: var(--emerald);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      border-radius: 99px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cart-trigger:not(.has-items) .cart-badge { display: none; }
    .btn-new-tab {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      background: var(--indigo);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      transition: all var(--transition);
    }
    .btn-new-tab:hover {
      background: var(--indigo-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(99,102,241,.35);
    }
    .persist-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      background: var(--emerald-soft);
      color: var(--emerald);
      font-size: 12px;
      font-weight: 600;
      border-radius: 99px;
    }

    /* ── Connected Tabs Bar ── */
    .tabs-bar {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      padding: 10px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .tabs-bar-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text2);
    }
    .tabs-bar-count {
      font-family: var(--mono);
      font-weight: 700;
      color: var(--indigo);
      background: var(--indigo-soft);
      padding: 2px 10px;
      border-radius: var(--radius-xs);
    }
    .tabs-bar-chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .tab-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xs);
      font-size: 12px;
      font-family: var(--mono);
    }
    .tab-chip.self {
      border-color: var(--indigo);
      background: var(--indigo-soft);
    }

    /* ── Main + Sidebar ── */
    .main-wrap {
      flex: 1;
      display: flex;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
    }
    .products-section {
      flex: 1;
      padding: 24px;
      min-width: 0;
    }
    .products-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 20px;
      color: var(--text);
    }

    /* ── Product Grid ── */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }
    @media (min-width: 768px) {
      .product-grid { grid-template-columns: repeat(3, 1fr); }
    }
    .product-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      transition: all var(--transition);
      position: relative;
      overflow: hidden;
    }
    .product-card:hover {
      border-color: var(--indigo);
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }
    .product-card.flash::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--indigo);
      opacity: 0;
      animation: flash 0.5s ease-out;
      pointer-events: none;
      border-radius: var(--radius);
    }
    @keyframes flash {
      0% { opacity: .15; }
      100% { opacity: 0; }
    }
    .product-emoji {
      width: 72px;
      height: 72px;
      background: var(--surface2);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      margin-bottom: 16px;
    }
    .product-name {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 6px;
      color: var(--text);
    }
    .product-price {
      font-family: var(--mono);
      font-size: 18px;
      font-weight: 700;
      color: var(--emerald);
      margin-bottom: 14px;
    }
    .btn-add-cart {
      width: 100%;
      padding: 12px 16px;
      background: var(--emerald);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      transition: all var(--transition);
    }
    .btn-add-cart:hover {
      background: var(--emerald-hover);
      transform: scale(1.02);
    }
    .btn-add-cart:active {
      transform: scale(.98);
    }

    /* ── Cart Sidebar ── */
    .cart-sidebar {
      width: 380px;
      min-width: 320px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      max-height: calc(100vh - 140px);
    }
    @media (max-width: 900px) {
      .main-wrap { flex-direction: column; }
      .cart-sidebar {
        width: 100%;
        min-width: 0;
        border-left: none;
        border-top: 1px solid var(--border);
        max-height: 60vh;
      }
    }
    .cart-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .cart-header h2 {
      font-size: 18px;
      font-weight: 700;
    }
    .sync-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text3);
    }
    .sync-indicator.synced {
      color: var(--emerald);
      animation: pulse-text 0.6s ease-out;
    }
    @keyframes pulse-text {
      0% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
    .cart-list {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }
    .cart-empty {
      text-align: center;
      padding: 48px 24px;
      color: var(--text3);
      font-size: 15px;
    }
    .cart-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      background: var(--surface2);
      border-radius: var(--radius-sm);
      margin-bottom: 10px;
      animation: slideIn 0.25s ease-out;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .cart-item-emoji {
      width: 44px;
      height: 44px;
      background: var(--surface);
      border-radius: var(--radius-xs);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .cart-item-info {
      flex: 1;
      min-width: 0;
    }
    .cart-item-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }
    .cart-item-price {
      font-size: 12px;
      color: var(--text2);
      font-family: var(--mono);
    }
    .cart-item-controls {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .qty-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border2);
      background: var(--surface);
      border-radius: var(--radius-xs);
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      color: var(--text);
    }
    .qty-btn:hover {
      border-color: var(--indigo);
      color: var(--indigo);
      background: var(--indigo-soft);
    }
    .qty-value {
      min-width: 28px;
      text-align: center;
      font-size: 15px;
      font-weight: 700;
      font-family: var(--mono);
    }
    .cart-item-total {
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 700;
      color: var(--emerald);
      min-width: 80px;
      text-align: right;
    }
    .btn-remove {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: var(--danger-soft);
      color: var(--danger);
      border-radius: var(--radius-xs);
      cursor: pointer;
      transition: all var(--transition);
    }
    .btn-remove:hover {
      background: var(--danger);
      color: #fff;
    }
    .cart-footer {
      padding: 20px 24px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .cart-total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      font-size: 18px;
      font-weight: 700;
    }
    .cart-total-row span:last-child {
      font-family: var(--mono);
      color: var(--emerald);
      font-size: 22px;
    }
    .btn-clear-cart {
      width: 100%;
      padding: 12px 16px;
      background: var(--surface2);
      color: var(--text2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      transition: all var(--transition);
    }
    .btn-clear-cart:hover {
      background: var(--danger-soft);
      color: var(--danger);
      border-color: var(--danger);
    }

    /* ── Cart overlay (mobile) ── */
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-brand">
        <span class="logo">🛒</span>
        <h1>TabShop</h1>
        <span class="persist-badge">persist: true</span>
      </div>
      <div class="header-actions">
        <button class="cart-trigger" id="cart-trigger" type="button">
          <span>장바구니</span>
          <span class="cart-badge" id="cart-badge">0</span>
        </button>
        <button class="btn-new-tab" id="btn-new-tab" type="button">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
          새 탭에서 열기
        </button>
      </div>
    </header>

    <div class="tabs-bar" id="tabs-bar">
      <span class="tabs-bar-label">연결된 탭</span>
      <span class="tabs-bar-count" id="tabs-count">1</span>
      <div class="tabs-bar-chips" id="tabs-chips"></div>
    </div>

    <div class="main-wrap">
      <main class="products-section">
        <h2 class="products-title">상품</h2>
        <div class="product-grid" id="product-grid"></div>
      </main>

      <aside class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header">
          <h2>장바구니</h2>
          <div class="sync-indicator" id="sync-indicator">실시간 동기화</div>
        </div>
        <div class="cart-list" id="cart-list">
          <div class="cart-empty">장바구니가 비어 있습니다</div>
        </div>
        <div class="cart-footer">
          <div class="cart-total-row">
            <span>총 금액</span>
            <span id="cart-total">₩0</span>
          </div>
          <button class="btn-clear-cart" id="btn-clear-cart" type="button">장바구니 비우기</button>
        </div>
      </aside>
    </div>
  </div>

  <script type="module">
    import { createTabSync } from '../dist/index.js';

    const PRODUCTS = [
      { id: 1, name: '무선 키보드', price: 89000, emoji: '⌨️' },
      { id: 2, name: '게이밍 마우스', price: 65000, emoji: '🖱️' },
      { id: 3, name: 'USB-C 허브', price: 45000, emoji: '🔌' },
      { id: 4, name: '모니터 거치대', price: 35000, emoji: '🖥️' },
      { id: 5, name: '노이즈캔슬링 이어폰', price: 120000, emoji: '🎧' },
      { id: 6, name: '웹캠 HD', price: 55000, emoji: '📷' },
    ];

    const sync = createTabSync({
      initial: { cart: [], lastAction: '' },
      channel: 'shopping-cart-demo',
      persist: true,
    });

    const $ = (sel) => document.querySelector(sel);
    const $$ = (sel) => document.querySelectorAll(sel);

    function formatPrice(n) {
      return '₩' + n.toLocaleString('ko-KR');
    }

    function flash(el) {
      if (!el) return;
      el.classList.remove('flash');
      void el.offsetWidth;
      el.classList.add('flash');
    }

    // ── Cart logic ──
    function addToCart(product) {
      const cart = [...(sync.get('cart') || [])];
      const idx = cart.findIndex((i) => i.id === product.id);
      if (idx >= 0) {
        cart[idx] = { ...cart[idx], quantity: cart[idx].quantity + 1 };
      } else {
        cart.push({ ...product, quantity: 1 });
      }
      sync.patch({ cart, lastAction: `add:${product.id}` });
    }

    function updateQuantity(productId, delta) {
      const cart = sync.get('cart').map((i) =>
        i.id === productId
          ? { ...i, quantity: Math.max(0, i.quantity + delta) }
          : i
      );
      const filtered = cart.filter((i) => i.quantity > 0);
      sync.patch({ cart: filtered, lastAction: `qty:${productId}` });
    }

    function removeFromCart(productId) {
      const cart = sync.get('cart').filter((i) => i.id !== productId);
      sync.patch({ cart, lastAction: `remove:${productId}` });
    }

    function clearCart() {
      sync.patch({ cart: [], lastAction: 'clear' });
    }

    // ── Render product grid ──
    function renderProducts() {
      const grid = $('#product-grid');
      grid.innerHTML = PRODUCTS.map(
        (p) => `
        <div class="product-card" data-product-id="${p.id}">
          <div class="product-emoji">${p.emoji}</div>
          <div class="product-name">${p.name}</div>
          <div class="product-price">${formatPrice(p.price)}</div>
          <button class="btn-add-cart" data-product-id="${p.id}">장바구니 추가</button>
        </div>
      `
      ).join('');

      $$('.btn-add-cart').forEach((btn) => {
        btn.addEventListener('click', () => {
          const product = PRODUCTS.find((p) => p.id === parseInt(btn.dataset.productId, 10));
          if (product) addToCart(product);
        });
      });
    }

    // ── Render cart ──
    function renderCart(cart) {
      const list = $('#cart-list');
      const badge = $('#cart-badge');
      const trigger = $('#cart-trigger');
      const totalEl = $('#cart-total');

      const itemCount = cart.reduce((sum, i) => sum + i.quantity, 0);
      const grandTotal = cart.reduce((sum, i) => sum + i.price * i.quantity, 0);

      badge.textContent = itemCount;
      trigger.classList.toggle('has-items', itemCount > 0);
      totalEl.textContent = formatPrice(grandTotal);

      if (cart.length === 0) {
        list.innerHTML = '<div class="cart-empty">장바구니가 비어 있습니다</div>';
        return;
      }

      list.innerHTML = cart
        .map(
          (item) => `
        <div class="cart-item" data-item-id="${item.id}">
          <div class="cart-item-emoji">${item.emoji}</div>
          <div class="cart-item-info">
            <div class="cart-item-name">${item.name}</div>
            <div class="cart-item-price">${formatPrice(item.price)} × ${item.quantity}</div>
          </div>
          <div class="cart-item-controls">
            <button class="qty-btn qty-minus" data-id="${item.id}">−</button>
            <span class="qty-value">${item.quantity}</span>
            <button class="qty-btn qty-plus" data-id="${item.id}">+</button>
          </div>
          <span class="cart-item-total">${formatPrice(item.price * item.quantity)}</span>
          <button class="btn-remove" data-id="${item.id}" type="button" title="삭제">×</button>
        </div>
      `
        )
        .join('');

      list.querySelectorAll('.qty-minus').forEach((btn) => {
        btn.addEventListener('click', () =>
          updateQuantity(parseInt(btn.dataset.id, 10), -1)
        );
      });
      list.querySelectorAll('.qty-plus').forEach((btn) => {
        btn.addEventListener('click', () =>
          updateQuantity(parseInt(btn.dataset.id, 10), 1)
        );
      });
      list.querySelectorAll('.btn-remove').forEach((btn) => {
        btn.addEventListener('click', () =>
          removeFromCart(parseInt(btn.dataset.id, 10))
        );
      });
    }

    // ── Render tabs bar ──
    function renderTabs() {
      const tabs = sync.getTabs();
      const countEl = $('#tabs-count');
      const chipsEl = $('#tabs-chips');

      countEl.textContent = tabs.length;
      chipsEl.innerHTML = tabs
        .map((t) => {
          const isSelf = t.id === sync.id;
          const short = t.id.slice(0, 8);
          return `<span class="tab-chip${isSelf ? ' self' : ''}">${short}${isSelf ? ' (나)' : ''}</span>`;
        })
        .join('');
    }

    // ── Sync indicator ──
    function showSyncFromRemote() {
      const el = $('#sync-indicator');
      el.textContent = '다른 탭에서 동기화됨';
      el.classList.add('synced');
      flash($('#cart-sidebar'));
      setTimeout(() => {
        el.textContent = '실시간 동기화';
        el.classList.remove('synced');
      }, 800);
    }

    // ── Subscriptions ──
    sync.on('cart', (value, meta) => {
      renderCart(value || []);
      if (!meta.isLocal) {
        showSyncFromRemote();
      }
    });

    sync.onTabChange(() => {
      renderTabs();
    });

    // ── Init ──
    renderProducts();
    renderCart(sync.get('cart') || []);
    renderTabs();

    $('#btn-clear-cart').addEventListener('click', clearCart);

    $('#btn-new-tab').addEventListener('click', () => {
      window.open(location.href, '_blank');
    });

    $('#cart-trigger').addEventListener('click', () => {
      $('#cart-sidebar').scrollIntoView({ behavior: 'smooth' });
    });

    window.addEventListener('beforeunload', () => sync.destroy());
  </script>
</body>
</html>
